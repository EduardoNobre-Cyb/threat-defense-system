<!DOCTYPE html>
<html>
  <head>
    <title>Threat Defense System - Login</title>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" type="text/css"/>
    <script>
      // If already logged in, send to the appropriate page
      (function() {
        if (localStorage.getItem('auth_token')) {
          if (localStorage.getItem('must_change_password') === 'true') {
            window.location.replace('/change-password');
          } else {
            window.location.replace('/');
          }
        }
      })();
    </script>
  </head>
  <body>

    <div class="login-wrapper">

      <div class="login-card">

        <div class="login-header">
          <div class="login-shield">🛡️</div>
          <h1 class="login-title">THREAT DEFENSE SYSTEM</h1>
          <p class="login-subtitle">Multi-Agent Security Platform</p>
          <div class="login-divider"></div>
        </div>

        <div class="login-prompt">
          <span class="terminal-prefix">$&gt;</span>
          <span class="terminal-text" id="terminal-text"></span>
          <span class="terminal-cursor">█</span>
        </div>

        <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

          <div class="login-field">
            <label class="login-label" for="email">// ANALYST EMAIL</label>
            <input
              class="login-input"
              type="email"
              id="email"
              name="email"
              placeholder="analyst@threatdefense.local"
              autocomplete="email"
              required
            />
          </div>

          <div class="login-field">
            <label class="login-label" for="password">// PASSWORD</label>
            <div class="password-wrapper">
              <input
                class="login-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="eye-toggle" onclick="togglePassword('password', this)" title="Show/hide password">👁</button>
            </div>
          </div>

          <div class="login-error" id="login-error" style="display: none;"></div>

          <button class="login-btn" type="submit" id="login-btn">
            <span id="btn-text">[ AUTHENTICATE ]</span>
          </button>

        </form>

        <div class="login-footer">
          <span class="login-version">v2.0.0</span>
          <span class="login-status">● SYSTEM ONLINE</span>
        </div>

      </div>

    </div>

    <script>
      // Typewriter effect for the terminal prompt
      const messages = [
        "Initialising secure connection...",
        "Awaiting analyst credentials.",
      ];
      let msgIndex = 0;
      let charIndex = 0;
      const el = document.getElementById('terminal-text');

      function typeWriter() {
        const msg = messages[msgIndex];
        if (charIndex < msg.length) {
          el.textContent += msg[charIndex];
          charIndex++;
          setTimeout(typeWriter, 45);
        } else {
          // Pause then clear and move to next message
          setTimeout(() => {
            el.textContent = '';
            charIndex = 0;
            msgIndex = (msgIndex + 1) % messages.length;
            typeWriter();
          }, 2500);
        }
      }
      typeWriter();

      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = '🙈';
        } else {
          input.type = 'password';
          btn.textContent = '👁';
        }
      }

      async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');

        // Reset error state
        errorEl.style.display = 'none';
        errorEl.textContent = '';
        btn.disabled = true;
        btnText.textContent = '[ AUTHENTICATING... ]';

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            // Show error returned from server
            errorEl.textContent = '⚠ ' + (data.error || 'Authentication failed.');
            errorEl.style.display = 'block';
            btn.disabled = false;
            btnText.textContent = '[ AUTHENTICATE ]';
            return;
          }

          // Store token and user info
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('user_role', data.role);
          localStorage.setItem('user_name', data.name);
          localStorage.setItem('must_change_password', data.must_change_password ? 'true' : 'false');

          btnText.textContent = '[ ACCESS GRANTED ]';

          // Brief pause so the user sees the success state, then redirect
          setTimeout(() => {
            if (data.must_change_password) {
              window.location.replace('/change-password');
            } else {
              window.location.replace('/');
            }
          }, 600);

        } catch (err) {
          errorEl.textContent = '⚠ Could not reach server. Is the Flask app running?';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btnText.textContent = '[ AUTHENTICATE ]';
        }
      }
    </script>

  </body>
</html>
