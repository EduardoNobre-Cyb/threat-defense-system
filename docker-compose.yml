services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threat-defense-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg2://threat_user:threat_password@postgres:5432/threat_modeling
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: neo4jpassword
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      VULNERS_API_KEY: ${VULNERS_API_KEY:-}
      SKIP_DB_SEED: ${SKIP_DB_SEED:-false}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@threatdefense.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-System Admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./pids:/app/pids
      - ./test_logs:/app/test_logs
      - ./data/models:/app/data/models

  postgres:
    image: postgres:16
    container_name: threat-defense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: threat_modeling
      POSTGRES_USER: threat_user
      POSTGRES_PASSWORD: threat_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threat_user -d threat_modeling"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: threat-defense-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: threat-defense-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p neo4jpassword 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
